<section class="flex w-full items-center justify-center gap-8">
  <div id="flujo" class="w-full max-w-4xl space-y-5">
    <p class="section-kicker">Flujo</p>
    <h2 class="text-3xl font-black tracking-tight text-slate-900 sm:text-4xl">Proceso claro desde configuración hasta entrega de resultados.</h2>
    <div class="space-y-4">
      @for (step of steps(); track step.title; let index = $index) {
        <div class="step-card flex gap-4 rounded-[1.5rem] p-5">
          <div class="step-index">{{ index + 1 }}</div>
          <div>
            <h3 class="text-xl font-black tracking-tight text-slate-900">{{ step.title }}</h3>
            <p class="mt-2 text-base leading-7 text-slate-600">{{ step.description }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
