<header class="glass-panel sticky top-3 z-30 flex flex-wrap items-center justify-between gap-3 rounded-[2rem] px-4 py-3 sm:top-4 sm:flex-nowrap sm:rounded-full sm:px-6">
  <a href="#" class="min-w-0 flex items-center gap-3">
    <div class="brand-mark flex h-11 w-11 items-center justify-center rounded-2xl">
      <span class="text-lg font-black text-white">M</span>
    </div>
    <div class="min-w-0">
      <p class="truncate text-lg font-black tracking-tight text-sky-700">MyLabDigi</p>
      <p class="truncate text-[10px] font-medium uppercase tracking-[0.22em] text-sky-500/80 sm:text-xs sm:tracking-[0.28em]">Digital Lab Core</p>
    </div>
  </a>

  <nav class="hidden items-center gap-7 lg:flex">
    @for (item of navItems(); track item) {
      <a class="text-sm font-semibold text-slate-600 transition hover:text-sky-600" [href]="'#' + item.toLowerCase()">
        {{ item }}
      </a>
    }
  </nav>

  <button pButton type="button" label="Solicitar demo" class="cta-button w-full sm:w-auto lg:inline-flex"></button>
</header>
