<section id="servicios" class="glass-panel rounded-[2rem] p-6 sm:p-8 lg:p-10">
  <div class="mb-8 flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
    <div class="max-w-2xl">
      <p class="section-kicker">Servicios</p>
      <h2 class="mt-3 text-3xl font-black tracking-tight text-slate-900 sm:text-4xl">¿Qué incluye MyLabDigi?</h2>
    </div>
  </div>

  <div class="grid gap-5 lg:grid-cols-3">
    @for (service of serviceCards(); track service.title) {
      <article class="service-card group rounded-[1.75rem] p-6">
        <div class="mb-5 h-1.5 w-24 rounded-full bg-gradient-to-r" [class]="service.accent"></div>
        <h3 class="text-2xl font-black tracking-tight text-slate-900">{{ service.title }}</h3>
        <p class="mt-4 text-base leading-7 text-slate-600">{{ service.description }}</p>
        <div class="mt-8 flex items-center gap-3">
          <span class="h-3 w-3 rounded-full bg-sky-400"></span>
          <span class="text-sm font-semibold text-sky-700">Experiencia consistente en desktop y móvil</span>
        </div>
      </article>
    }
  </div>
</section>
